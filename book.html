<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, serif;
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #aa8844;
            font-size: 18px;
        }

        .book {
            display: flex;
            width: 1100px;
            height: 700px;
            position: relative;
        }

        .page {
            width: 550px;
            height: 700px;
            background: #f8f4ec;
            padding: 50px 50px 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .page-left {
            border-radius: 8px 0 0 8px;
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.08);
            border-right: 1px solid #d0c8b8;
        }

        .page-right {
            border-radius: 0 8px 8px 0;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.08);
            border-left: 1px solid #d0c8b8;
        }

        .page-content {
            flex: 1;
            font-size: 13px;
            line-height: 1.75;
            color: #222;
            text-align: justify;
            overflow: hidden;
        }

        .page-content h1, .page-content h2, .page-content h3 {
            text-align: center;
            margin: 15px 0;
            color: #333;
        }

        .page-content h1 { font-size: 22px; }
        .page-content h2 { font-size: 18px; }
        .page-content h3 { font-size: 15px; }

        .page-content p {
            margin-bottom: 10px;
            text-indent: 1.5em;
        }

        .page-number {
            text-align: center;
            font-size: 11px;
            color: #999;
            padding-top: 10px;
        }

        .cover-page {
            background: linear-gradient(145deg, #6b3a1f, #3e2215);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #e8d5b0;
        }

        .cover-page h1 {
            font-size: 28px;
            letter-spacing: 3px;
            border-top: 2px solid #aa8844;
            border-bottom: 2px solid #aa8844;
            padding: 20px 0;
            color: #e8d5b0;
        }

        .cover-page .author {
            margin-top: 15px;
            font-style: italic;
            color: #aa8844;
            font-size: 16px;
        }

        .nav-controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-btn {
            background: rgba(170, 136, 68, 0.2);
            border: 1px solid rgba(170, 136, 68, 0.4);
            color: #aa8844;
            padding: 10px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 14px;
            transition: background 0.2s;
        }

        .nav-btn:hover { background: rgba(170, 136, 68, 0.35); }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }

        .page-indicator {
            color: #777;
            font-size: 13px;
            min-width: 120px;
            text-align: center;
        }

        .hint {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">Loading book...</div>

    <div class="book" id="book">
        <div class="page page-left" id="pageLeft">
            <div class="page-content" id="contentLeft"></div>
            <div class="page-number" id="numLeft"></div>
        </div>
        <div class="page page-right" id="pageRight">
            <div class="page-content" id="contentRight"></div>
            <div class="page-number" id="numRight"></div>
        </div>
    </div>

    <div class="nav-controls">
        <button class="nav-btn" id="prevBtn" onclick="prev()">← Previous</button>
        <div class="page-indicator" id="indicator"></div>
        <button class="nav-btn" id="nextBtn" onclick="next()">Next →</button>
    </div>

    <div class="hint">Arrow keys or click buttons to navigate</div>

    <script>
        let pages = [];
        let currentSpread = 0;

        let bookTitle = 'My Book';
        let bookAuthor = '';

        // ---- MOBI PARSER ----

        class MobiParser {
            constructor(buf) {
                this.dv = new DataView(buf);
                this.u8 = new Uint8Array(buf);
                this.len = buf.byteLength;
            }
            u16(o) { return this.dv.getUint16(o, false); }
            u32(o) { return this.dv.getUint32(o, false); }
            str(o, n) {
                let s = '';
                for (let i = 0; i < n; i++) {
                    const c = this.u8[o + i];
                    if (c === 0) break;
                    s += String.fromCharCode(c);
                }
                return s;
            }

            parse() {
                const name = this.str(0, 32).trim();
                const numRec = this.u16(76);
                const recs = [];
                for (let i = 0; i < numRec; i++) recs.push(this.u32(78 + i * 8));
                recs.push(this.len);

                const r0 = recs[0];
                const compression = this.u16(r0);
                const textRecCount = this.u16(r0 + 8);

                let encoding = 1252;
                let title = name;
                const magic = this.str(r0 + 16, 4);
                if (magic === 'MOBI') {
                    encoding = this.u32(r0 + 28);
                    try {
                        const fnOff = this.u32(r0 + 84);
                        const fnLen = this.u32(r0 + 88);
                        if (fnOff && fnLen) title = this.str(r0 + fnOff, fnLen);
                    } catch(e) {}
                }

                let html = '';
                const end = Math.min(1 + textRecCount, numRec);
                for (let i = 1; i < end; i++) {
                    const start = recs[i];
                    const stop = recs[i + 1] || this.len;
                    let data = this.u8.slice(start, stop);

                    if (compression === 2) {
                        data = this.decompress(data);
                    }

                    const enc = encoding === 65001 ? 'utf-8' : 'windows-1252';
                    html += new TextDecoder(enc, { fatal: false }).decode(data);
                }

                return { title, html };
            }

            decompress(data) {
                const out = [];
                let i = 0;
                while (i < data.length) {
                    const c = data[i++];
                    if (c === 0) { out.push(0); }
                    else if (c <= 8) { for (let j = 0; j < c && i < data.length; j++) out.push(data[i++]); }
                    else if (c <= 0x7F) { out.push(c); }
                    else if (c <= 0xBF) {
                        if (i >= data.length) break;
                        const nx = data[i++];
                        const dist = ((c << 8) | nx) >> 3 & 0x7FF;
                        const len = (nx & 7) + 3;
                        for (let j = 0; j < len; j++) {
                            const p = out.length - dist;
                            out.push(p >= 0 ? out[p] : 0);
                        }
                    } else {
                        out.push(0x20);
                        out.push(c ^ 0x80);
                    }
                }
                return new Uint8Array(out);
            }
        }

        // ---- PAGINATION ----

        function paginate(html) {
            pages = [];

            // Clean up
            html = html.replace(/<mbp:[^>]*>/gi, '').replace(/<\/mbp:[^>]*>/gi, '');
            html = html.replace(/<guide>[\s\S]*?<\/guide>/gi, '');

            // Split into blocks
            const blocks = [];
            const re = /(<(?:p|div|h[1-6]|blockquote|ul|ol|li|pre|hr|br)[^>]*>[\s\S]*?<\/(?:p|div|h[1-6]|blockquote|ul|ol|li|pre)>|<(?:br|hr)\s*\/?>)/gi;
            let last = 0, m;
            while ((m = re.exec(html)) !== null) {
                const before = html.substring(last, m.index).trim();
                if (before) blocks.push('<p>' + before + '</p>');
                blocks.push(m[0]);
                last = re.lastIndex;
            }
            const rem = html.substring(last).trim();
            if (rem) blocks.push('<p>' + rem + '</p>');

            if (blocks.length === 0) {
                const plain = html.replace(/<[^>]+>/g, ' ').trim();
                if (plain) blocks.push('<p>' + plain + '</p>');
            }

            // Measure with a hidden div
            const box = document.createElement('div');
            box.style.cssText = 'position:absolute;visibility:hidden;width:450px;height:600px;font:13px/1.75 Georgia,serif;text-align:justify;overflow:hidden;padding:0;';
            document.body.appendChild(box);

            let cur = '';
            for (const block of blocks) {
                const test = cur + block;
                box.innerHTML = test;
                if (box.scrollHeight > box.clientHeight && cur) {
                    pages.push(cur);
                    cur = block;
                } else {
                    cur = test;
                }
            }
            if (cur.trim()) pages.push(cur);

            document.body.removeChild(box);

            if (pages.length === 0) pages.push('<p>No content found.</p>');
        }

        // ---- DISPLAY ----

        function showSpread(idx) {
            currentSpread = idx;

            const leftIdx = idx * 2;
            const rightIdx = idx * 2 + 1;

            const cl = document.getElementById('contentLeft');
            const cr = document.getElementById('contentRight');
            const nl = document.getElementById('numLeft');
            const nr = document.getElementById('numRight');
            const pl = document.getElementById('pageLeft');
            const pr = document.getElementById('pageRight');

            // Reset classes
            pl.className = 'page page-left';
            pr.className = 'page page-right';

            // Left page
            if (leftIdx < pages.length) {
                cl.innerHTML = pages[leftIdx];
                nl.textContent = leftIdx + 1;
            } else {
                cl.innerHTML = '';
                nl.textContent = '';
            }

            // Right page
            if (rightIdx < pages.length) {
                cr.innerHTML = pages[rightIdx];
                nr.textContent = rightIdx + 1;
            } else {
                cr.innerHTML = '';
                nr.textContent = '';
            }

            // Update nav
            const maxSpread = Math.ceil(pages.length / 2) - 1;
            document.getElementById('prevBtn').disabled = idx <= 0;
            document.getElementById('nextBtn').disabled = idx >= maxSpread;

            const l = leftIdx + 1;
            const r = Math.min(rightIdx + 1, pages.length);
            document.getElementById('indicator').textContent =
                l === r ? `Page ${l} of ${pages.length}` : `Pages ${l}–${r} of ${pages.length}`;
        }

        function next() {
            const max = Math.ceil(pages.length / 2) - 1;
            if (currentSpread < max) showSpread(currentSpread + 1);
        }

        function prev() {
            if (currentSpread > 0) showSpread(currentSpread - 1);
        }

        // ---- INIT ----

        async function init() {
            try {
                const resp = await fetch('/mybook.mobi');
                if (!resp.ok) throw new Error('Not found');
                const buf = await resp.arrayBuffer();
                const parser = new MobiParser(buf);
                const book = parser.parse();
                bookTitle = book.title || 'My Book';
                paginate(book.html);
            } catch (e) {
                console.error(e);
                pages = [
                    '<h2>Could not load book</h2><p>Place a .mobi file at <strong>/mybook.mobi</strong> and refresh the page.</p>',
                    '<h2>About</h2><p>This reader parses MOBI files directly in the browser with no dependencies. It supports PalmDOC compressed files.</p><p>Use arrow keys or the buttons below to navigate.</p>'
                ];
            }

            document.getElementById('loading-screen').style.display = 'none';
            showSpread(0);
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
        });

        let tx = 0;
        document.addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].screenX - tx;
            if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
        }, { passive: true });

        init();
    </script>
</body>
</html>
