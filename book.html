<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Book Reader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, serif;
            overflow: hidden; /* Prevent body scroll, we scale the content */
        }

        /* Scaling container to handle smaller laptops/screens */
        #scaler {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s ease-out;
            transform-origin: center center;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #aa8844;
            font-size: 18px;
        }

        .search-bar {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(170,136,68,0.3);
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: #eee;
            outline: none;
            font-family: inherit;
            width: 200px;
        }

        .book {
            display: flex;
            width: 1100px;
            height: 680px;
            margin-bottom: 10px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .page {
            width: 550px;
            height: 680px;
            background: #f8f4ec;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .page-left {
            border-radius: 8px 0 0 8px;
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.05);
            border-right: 1px solid #d0c8b8;
        }

        .page-right {
            border-radius: 0 8px 8px 0;
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.05);
            border-left: 1px solid #d0c8b8;
        }

        .page-inner {
            flex: 1;
            padding: 40px 50px 0px;
            overflow: hidden;
        }

        .page-content {
            font-size: 15px; /* Slightly larger for readability */
            line-height: 1.6;
            color: #222;
            text-align: justify;
            height: 580px; /* Locked height for pagination logic */
        }

        /* Search Highlight */
        mark {
            background: #ffeb3b;
            color: #000;
            padding: 0 2px;
            border-radius: 2px;
        }

        .page-number {
            text-align: center;
            font-size: 11px;
            color: #999;
            padding: 10px 0 15px;
        }

        .controls-bar {
            width: 1100px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
        }

        .nav-btn {
            background: rgba(170,136,68,0.2);
            border: 1px solid rgba(170,136,68,0.4);
            color: #aa8844;
            padding: 8px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 13px;
            transition: all 0.2s;
        }

        .nav-btn:hover { background: rgba(170,136,68,0.4); color: #fff; }
        .nav-btn:disabled { opacity: 0.2; cursor: default; }

        #slider { flex: 1; accent-color: #aa8844; cursor: pointer; }
        
        .indicator { color: #888; font-size: 12px; min-width: 120px; text-align: center; }
    </style>
</head>
<body>

    <div id="loading-screen">Processing Manuscript...</div>

    <div id="scaler">
      <!-- Replace your current .search-bar with this enhanced version -->
<div class="search-bar" style="gap: 8px; padding: 8px 15px;">
    <input type="text" id="searchInput" placeholder="Find in book..." 
           onkeydown="if(event.key==='Enter') searchBook()">
    
    <button class="nav-btn" style="padding: 4px 15px;" onclick="searchBook()">Search</button>
    
    <div id="searchInfo" style="margin-left: 10px; color: #aa8844; font-size: 13px; min-width: 140px; display: none;">
        <span id="matchCount"></span>
    </div>

    <button class="nav-btn" id="prevMatchBtn" onclick="prevMatch()" style="display: none; padding: 4px 12px;">↑</button>
    <button class="nav-btn" id="nextMatchBtn" onclick="nextMatch()" style="display: none; padding: 4px 12px;">↓</button>
</div>

        <div class="book" id="book">
            <div class="page page-left">
                <div class="page-inner"><div class="page-content" id="contentLeft"></div></div>
                <div class="page-number" id="numLeft"></div>
            </div>
            <div class="page page-right">
                <div class="page-inner"><div class="page-content" id="contentRight"></div></div>
                <div class="page-number" id="numRight"></div>
            </div>
        </div>

        <div class="controls-bar">
            <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
            <input type="range" id="slider" min="0" value="0">
            <span class="indicator" id="indicator"></span>
            <button class="nav-btn" id="nextBtn" onclick="next()">Next →</button>
        </div>
    </div>

    <script>
        let pages = [];
        let currentSpread = 0;
        let fullBookHtml = "";

        // ---- MOBI PARSER (Core Logic) ----
        class MobiParser {
            constructor(buf) {
                this.dv = new DataView(buf);
                this.u8 = new Uint8Array(buf);
                this.len = buf.byteLength;
            }
            u16(o) { return this.dv.getUint16(o, false); }
            u32(o) { return this.dv.getUint32(o, false); }
            str(o, n) {
                let s = '';
                for (let i = 0; i < n; i++) {
                    const c = this.u8[o + i];
                    if (c === 0) break;
                    s += String.fromCharCode(c);
                }
                return s;
            }
            parse() {
                const numRec = this.u16(76);
                const recs = [];
                for (let i = 0; i < numRec; i++) recs.push(this.u32(78 + i * 8));
                recs.push(this.len);
                const r0 = recs[0];
                const compression = this.u16(r0);
                const textRecCount = this.u16(r0 + 8);
                let html = '';
                for (let i = 1; i <= textRecCount; i++) {
                    let data = this.u8.slice(recs[i], recs[i+1]);
                    if (compression === 2) data = this.decompress(data);
                    html += new TextDecoder('utf-8').decode(data);
                }
                return html;
            }
            decompress(data) {
                const out = []; let i = 0;
                while (i < data.length) {
                    const c = data[i++];
                    if (c === 0) out.push(0);
                    else if (c <= 8) { for (let j = 0; j < c; j++) out.push(data[i++]); }
                    else if (c <= 0x7F) out.push(c);
                    else if (c <= 0xBF) {
                        const nx = data[i++];
                        const dist = ((c << 8) | nx) >> 3 & 0x7FF;
                        const len = (nx & 7) + 3;
                        for (let j = 0; j < len; j++) out.push(out[out.length - dist] || 0);
                    } else { out.push(0x20, c ^ 0x80); }
                }
                return new Uint8Array(out);
            }
        }

        // ---- THE FIXED PAGINATOR (Word-by-word overflow check) ----
        function paginate(html) {
            pages = [];
            const measurer = document.createElement('div');
            // Matches .page-content styles exactly
            measurer.style.cssText = `position:absolute; visibility:hidden; width:450px; height:580px; font-family:Georgia,serif; font-size:15px; line-height:1.6; text-align:justify; padding:0;`;
            document.body.appendChild(measurer);

            const temp = document.createElement('div');
            temp.innerHTML = html.replace(/<img[^>]*>/gi, ""); // Stripping images for stability
            
            let currentPageContent = "";
            const nodes = Array.from(temp.childNodes);

            for (let node of nodes) {
                let nodeHtml = node.nodeType === 3 ? node.textContent : node.outerHTML;
                measurer.innerHTML = currentPageContent + nodeHtml;

                if (measurer.scrollHeight <= 580) {
                    currentPageContent += nodeHtml;
                } else {
                    // Node is too big, if it's a paragraph, split it by words
                    if (node.nodeType === 1 && (node.tagName === 'P' || node.tagName === 'DIV')) {
                        const words = node.innerHTML.split(' ');
                        const tag = node.tagName;
                        let partial = `<${tag}>`;
                        
                        for (let word of words) {
                            measurer.innerHTML = currentPageContent + partial + word + ` </${tag}>`;
                            if (measurer.scrollHeight > 580) {
                                pages.push(currentPageContent + partial + `</${tag}>`);
                                currentPageContent = "";
                                partial = `<${tag}>` + word + " ";
                            } else {
                                partial += word + " ";
                            }
                        }
                        currentPageContent += partial + `</${tag}>`;
                    } else {
                        // Headers or other blocks just move to next page
                        pages.push(currentPageContent);
                        currentPageContent = nodeHtml;
                    }
                }
            }
            if (currentPageContent) pages.push(currentPageContent);
            document.body.removeChild(measurer);
        }

        // ---- AUTO-SCALER (Fixes the laptop/screen size issue) ----
        function fitToScreen() {
            const scaler = document.getElementById('scaler');
            const availableHeight = window.innerHeight - 40;
            const availableWidth = window.innerWidth - 40;
            const contentHeight = 850; // Total height of scaler content
            const contentWidth = 1100;

            const scale = Math.min(availableHeight / contentHeight, availableWidth / contentWidth, 1);
            scaler.style.transform = `scale(${scale})`;
        }

        // ---- SEARCH FEATURE ----
      // Global variables for search
let currentMatches = [];
let currentMatchIndex = -1;
let lastSearchQuery = "";

function searchBook() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) {
        clearSearch();
        return;
    }

    if (query === lastSearchQuery && currentMatches.length > 0) {
        // Just navigate to next match if same query
        nextMatch();
        return;
    }

    lastSearchQuery = query;
    clearSearchHighlights(); // Remove old highlights

    // Re-paginate from original clean HTML
    paginate(fullBookHtml);

    const regex = new RegExp(`(${escapeRegExp(query)})`, 'gi');
    currentMatches = [];

    // Find all matches with their page and position info
    pages.forEach((content, pageIndex) => {
        let match;
        while ((match = regex.exec(content)) !== null) {
            currentMatches.push({
                pageIndex: pageIndex,
                spreadIndex: Math.floor(pageIndex / 2),
                matchText: match[0],
                offset: match.index
            });
        }
    });

    const matchCountEl = document.getElementById('matchCount');
    const infoEl = document.getElementById('searchInfo');
    const prevBtn = document.getElementById('prevMatchBtn');
    const nextBtn = document.getElementById('nextMatchBtn');

    if (currentMatches.length === 0) {
        infoEl.style.display = 'inline-block';
        matchCountEl.textContent = "No matches";
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';
        alert("No matches found for \"" + query + "\"");
        return;
    }

    // Highlight ALL matches in the pages array
    const highlightedPages = pages.map((content, idx) => {
        return content.replace(regex, `<mark>$1</mark>`);
    });

    // Update pages with highlights (so they stay when flipping)
    pages = highlightedPages;

    // Show info
    infoEl.style.display = 'inline-block';
    matchCountEl.textContent = `${currentMatches.length} match${currentMatches.length > 1 ? 'es' : ''}`;

    prevBtn.style.display = 'inline-block';
    nextBtn.style.display = 'inline-block';

    currentMatchIndex = 0;
    showSpread(currentMatches[0].spreadIndex);
}

function clearSearchHighlights() {
    if (fullBookHtml) {
        paginate(fullBookHtml); // Reset to clean pages
    }
    currentMatches = [];
    currentMatchIndex = -1;
    lastSearchQuery = "";
    
    document.getElementById('searchInfo').style.display = 'none';
    document.getElementById('prevMatchBtn').style.display = 'none';
    document.getElementById('nextMatchBtn').style.display = 'none';
}

function escapeRegExp(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function prevMatch() {
    if (currentMatches.length === 0) return;
    currentMatchIndex = (currentMatchIndex - 1 + currentMatches.length) % currentMatches.length;
    showSpread(currentMatches[currentMatchIndex].spreadIndex);
}

function nextMatch() {
    if (currentMatches.length === 0) return;
    currentMatchIndex = (currentMatchIndex + 1) % currentMatches.length;
    showSpread(currentMatches[currentMatchIndex].spreadIndex);
}

// Optional: Clear search when clicking outside or pressing Esc
document.addEventListener('keydown', e => {
    if (e.key === "Escape") {
        const input = document.getElementById('searchInput');
        if (document.activeElement === input) {
            input.value = "";
            clearSearchHighlights();
        }
    }
});
        // ---- DISPLAY LOGIC ----
        function showSpread(idx) {
            const max = Math.max(0, Math.ceil(pages.length / 2) - 1);
            currentSpread = Math.max(0, Math.min(idx, max));

            const L = currentSpread * 2;
            const R = L + 1;

            document.getElementById('contentLeft').innerHTML = pages[L] || "";
            document.getElementById('numLeft').textContent = pages[L] ? L + 1 : "";
            document.getElementById('contentRight').innerHTML = pages[R] || "";
            document.getElementById('numRight').textContent = pages[R] ? R + 1 : "";

            document.getElementById('prevBtn').disabled = currentSpread === 0;
            document.getElementById('nextBtn').disabled = currentSpread === max;
            document.getElementById('slider').max = max;
            document.getElementById('slider').value = currentSpread;
            document.getElementById('indicator').textContent = `Spread ${currentSpread + 1} / ${max + 1}`;
        }

        function next() { showSpread(currentSpread + 1); }
        function prev() { showSpread(currentSpread - 1); }

        // ---- START ----
        async function init() {
            try {
                const r = await fetch('mybook.mobi');
                if(!r.ok) throw new Error();
                const b = await r.arrayBuffer();
                fullBookHtml = new MobiParser(b).parse();
                paginate(fullBookHtml);
            } catch (e) {
                fullBookHtml = "<h1>Book Not Found</h1><p>Ensure <b>mybook.mobi</b> is in the same folder.</p>";
                paginate(fullBookHtml);
            }
            document.getElementById('loading-screen').style.display = 'none';
            fitToScreen();
            showSpread(0);
        }

        window.addEventListener('resize', fitToScreen);
        document.getElementById('slider').oninput = function() { showSpread(parseInt(this.value)); };
        
        // Keyboard Support
        document.addEventListener('keydown', e => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === "ArrowRight") next();
            if (e.key === "ArrowLeft") prev();
        });

        init();
    </script>
</body>
</html>
