<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, serif;
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #aa8844;
            font-size: 18px;
        }

        .book {
            display: flex;
            width: 1100px;
            height: 680px;
            margin-bottom: 10px;
        }

        .page {
            width: 550px;
            height: 680px;
            background: #f8f4ec;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .page-left {
            border-radius: 8px 0 0 8px;
            box-shadow: inset -10px 0 20px rgba(0,0,0,0.08);
            border-right: 1px solid #d0c8b8;
        }

        .page-right {
            border-radius: 0 8px 8px 0;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.08);
            border-left: 1px solid #d0c8b8;
        }

        .page-inner {
            flex: 1;
            padding: 45px 45px 10px;
            overflow: hidden;
            min-height: 0;
        }

        .page-content {
            font-size: 13px;
            line-height: 1.75;
            color: #222;
            text-align: justify;
            height: 100%;
            overflow: hidden;
        }

        .page-content h1, .page-content h2, .page-content h3 {
            text-align: center;
            margin: 15px 0;
            color: #333;
        }

        .page-content h1 { font-size: 22px; }
        .page-content h2 { font-size: 18px; }
        .page-content h3 { font-size: 15px; }

        .page-content p {
            margin-bottom: 10px;
            text-indent: 1.5em;
        }

        .page-number {
            text-align: center;
            font-size: 11px;
            color: #999;
            padding: 8px 0 12px;
            flex-shrink: 0;
        }

        .controls-bar {
            width: 1100px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
        }

        .nav-btn {
            background: rgba(170,136,68,0.2);
            border: 1px solid rgba(170,136,68,0.4);
            color: #aa8844;
            padding: 8px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 13px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .nav-btn:hover { background: rgba(170,136,68,0.35); }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }

        .slider-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        #slider {
            width: 100%;
            accent-color: #aa8844;
            cursor: pointer;
        }

        .page-jump {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .page-jump label {
            color: #777;
            font-size: 12px;
            white-space: nowrap;
        }

        #pageInput {
            width: 55px;
            background: rgba(170,136,68,0.15);
            border: 1px solid rgba(170,136,68,0.4);
            color: #ccc;
            padding: 5px 8px;
            border-radius: 6px;
            font-family: Georgia, serif;
            font-size: 12px;
            text-align: center;
        }

        #pageInput:focus {
            outline: none;
            border-color: #aa8844;
        }

        #jumpBtn {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 6px;
        }

        .page-indicator {
            color: #777;
            font-size: 12px;
            min-width: 110px;
            text-align: center;
            flex-shrink: 0;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="loading-screen">Loading book...</div>

    <div class="book" id="book">
        <div class="page page-left" id="pageLeft">
            <div class="page-inner">
                <div class="page-content" id="contentLeft"></div>
            </div>
            <div class="page-number" id="numLeft"></div>
        </div>
        <div class="page page-right" id="pageRight">
            <div class="page-inner">
                <div class="page-content" id="contentRight"></div>
            </div>
            <div class="page-number" id="numRight"></div>
        </div>
    </div>

    <div class="controls-bar">
        <button class="nav-btn" id="prevBtn" onclick="prev()">← Prev</button>
        <div class="slider-wrap">
            <input type="range" id="slider" min="0" max="0" value="0">
        </div>
        <div class="page-indicator" id="indicator"></div>
        <div class="page-jump">
            <label>Page:</label>
            <input type="number" id="pageInput" min="1" value="1">
            <button class="nav-btn" id="jumpBtn" onclick="jumpToPage()">Go</button>
        </div>
        <button class="nav-btn" id="nextBtn" onclick="next()">Next →</button>
    </div>

    <script>
        let pages = [];
        let currentSpread = 0;

        // ---- MOBI PARSER ----

        class MobiParser {
            constructor(buf) {
                this.dv = new DataView(buf);
                this.u8 = new Uint8Array(buf);
                this.len = buf.byteLength;
            }
            u16(o) { return this.dv.getUint16(o, false); }
            u32(o) { return this.dv.getUint32(o, false); }
            str(o, n) {
                let s = '';
                for (let i = 0; i < n; i++) {
                    const c = this.u8[o + i];
                    if (c === 0) break;
                    s += String.fromCharCode(c);
                }
                return s;
            }

            parse() {
                const name = this.str(0, 32).trim();
                const numRec = this.u16(76);
                const recs = [];
                for (let i = 0; i < numRec; i++) recs.push(this.u32(78 + i * 8));
                recs.push(this.len);

                const r0 = recs[0];
                const compression = this.u16(r0);
                const textRecCount = this.u16(r0 + 8);

                let encoding = 1252;
                let title = name;
                const magic = this.str(r0 + 16, 4);
                if (magic === 'MOBI') {
                    encoding = this.u32(r0 + 28);
                    try {
                        const fnOff = this.u32(r0 + 84);
                        const fnLen = this.u32(r0 + 88);
                        if (fnOff && fnLen) title = this.str(r0 + fnOff, fnLen);
                    } catch(e) {}
                }

                let html = '';
                const end = Math.min(1 + textRecCount, numRec);
                for (let i = 1; i < end; i++) {
                    const start = recs[i];
                    const stop = recs[i + 1] || this.len;
                    let data = this.u8.slice(start, stop);
                    if (compression === 2) data = this.decompress(data);
                    const enc = encoding === 65001 ? 'utf-8' : 'windows-1252';
                    html += new TextDecoder(enc, { fatal: false }).decode(data);
                }

                return { title, html };
            }

            decompress(data) {
                const out = [];
                let i = 0;
                while (i < data.length) {
                    const c = data[i++];
                    if (c === 0) out.push(0);
                    else if (c <= 8) { for (let j = 0; j < c && i < data.length; j++) out.push(data[i++]); }
                    else if (c <= 0x7F) out.push(c);
                    else if (c <= 0xBF) {
                        if (i >= data.length) break;
                        const nx = data[i++];
                        const dist = ((c << 8) | nx) >> 3 & 0x7FF;
                        const len = (nx & 7) + 3;
                        for (let j = 0; j < len; j++) {
                            const p = out.length - dist;
                            out.push(p >= 0 ? out[p] : 0);
                        }
                    } else {
                        out.push(0x20);
                        out.push(c ^ 0x80);
                    }
                }
                return new Uint8Array(out);
            }
        }

        // ---- PAGINATION ----

        function paginate(html) {
            pages = [];

            html = html.replace(/<mbp:[^>]*>/gi, '').replace(/<\/mbp:[^>]*>/gi, '');
            html = html.replace(/<guide>[\s\S]*?<\/guide>/gi, '');

            const blocks = [];
            const re = /(<(?:p|div|h[1-6]|blockquote|ul|ol|li|pre|hr|br)[^>]*>[\s\S]*?<\/(?:p|div|h[1-6]|blockquote|ul|ol|li|pre)>|<(?:br|hr)\s*\/?>)/gi;
            let last = 0, m;
            while ((m = re.exec(html)) !== null) {
                const before = html.substring(last, m.index).trim();
                if (before) blocks.push('<p>' + before + '</p>');
                blocks.push(m[0]);
                last = re.lastIndex;
            }
            const rem = html.substring(last).trim();
            if (rem) blocks.push('<p>' + rem + '</p>');

            if (blocks.length === 0) {
                const plain = html.replace(/<[^>]+>/g, ' ').trim();
                if (plain) blocks.push('<p>' + plain + '</p>');
            }

            // Measure using a clone of actual page dimensions
            const box = document.createElement('div');
            // Match .page-inner minus bottom padding, and .page-content styles
            // .page is 680px, .page-inner padding-top 45px padding-bottom 10px = 55px
            // .page-number is ~30px. So content area ≈ 680 - 55 - 30 = 595
            // .page-inner width = 550 - 45*2 = 460
            box.style.cssText = `
                position: absolute;
                visibility: hidden;
                width: 460px;
                height: 595px;
                font-family: Georgia, serif;
                font-size: 13px;
                line-height: 1.75;
                text-align: justify;
                overflow: hidden;
                padding: 0;
            `;
            document.body.appendChild(box);

            let cur = '';
            for (const block of blocks) {
                const test = cur + block;
                box.innerHTML = test;
                if (box.scrollHeight > box.clientHeight && cur) {
                    pages.push(cur);
                    cur = block;
                } else {
                    cur = test;
                }
            }
            if (cur.trim()) pages.push(cur);

            document.body.removeChild(box);

            if (pages.length === 0) pages.push('<p>No content found.</p>');
        }

        // ---- DISPLAY ----

        function showSpread(idx) {
            const maxSpread = Math.max(0, Math.ceil(pages.length / 2) - 1);
            idx = Math.max(0, Math.min(idx, maxSpread));
            currentSpread = idx;

            const leftIdx = idx * 2;
            const rightIdx = idx * 2 + 1;

            const cl = document.getElementById('contentLeft');
            const cr = document.getElementById('contentRight');
            const nl = document.getElementById('numLeft');
            const nr = document.getElementById('numRight');

            if (leftIdx < pages.length) {
                cl.innerHTML = pages[leftIdx];
                nl.textContent = leftIdx + 1;
            } else {
                cl.innerHTML = '';
                nl.textContent = '';
            }

            if (rightIdx < pages.length) {
                cr.innerHTML = pages[rightIdx];
                nr.textContent = rightIdx + 1;
            } else {
                cr.innerHTML = '';
                nr.textContent = '';
            }

            document.getElementById('prevBtn').disabled = idx <= 0;
            document.getElementById('nextBtn').disabled = idx >= maxSpread;

            // Update slider
            const slider = document.getElementById('slider');
            slider.max = maxSpread;
            slider.value = idx;

            // Update indicator
            const l = leftIdx + 1;
            const r = Math.min(rightIdx + 1, pages.length);
            document.getElementById('indicator').textContent =
                l === r ? `Page ${l} of ${pages.length}` : `${l}–${r} of ${pages.length}`;

            // Update page input placeholder
            document.getElementById('pageInput').value = l;
        }

        function next() {
            showSpread(currentSpread + 1);
        }

        function prev() {
            showSpread(currentSpread - 1);
        }

        function jumpToPage() {
            const val = parseInt(document.getElementById('pageInput').value);
            if (isNaN(val) || val < 1) return;
            const pageIdx = val - 1;
            const spread = Math.floor(pageIdx / 2);
            showSpread(spread);
        }

        // ---- INIT ----

        async function init() {
            try {
                const resp = await fetch('/mybook.mobi');
                if (!resp.ok) throw new Error('Not found');
                const buf = await resp.arrayBuffer();
                const parser = new MobiParser(buf);
                const book = parser.parse();
                paginate(book.html);
            } catch (e) {
                console.error(e);
                pages = [
                    '<h2>Could not load book</h2><p>Place a .mobi file at <strong>/mybook.mobi</strong> and refresh the page.</p>',
                    '<h2>About</h2><p>This reader parses MOBI files directly in the browser. Use arrow keys, buttons, the slider, or type a page number to navigate.</p>'
                ];
            }

            document.getElementById('loading-screen').style.display = 'none';
            showSpread(0);
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            if (document.activeElement === document.getElementById('pageInput')) {
                if (e.key === 'Enter') { jumpToPage(); e.preventDefault(); }
                return;
            }
            if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
        });

        // Slider
        document.getElementById('slider').addEventListener('input', function () {
            showSpread(parseInt(this.value));
        });

        // Page input enter key
        document.getElementById('pageInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { jumpToPage(); e.preventDefault(); }
        });

        // Touch swipe
        let tx = 0;
        document.addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; }, { passive: true });
        document.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].screenX - tx;
            if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
        }, { passive: true });

        init();
    </script>
</body>
</html>
